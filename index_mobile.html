<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@200;300&display=swap" rel="stylesheet">
<title>创世之掌 · 七日谈 (移动版)</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
video{position:fixed;top:0;left:0;width:240px;opacity:0.15;z-index:1;pointer-events:none;transform:scaleX(-1);border-radius:6px;border:1px solid rgba(80,120,200,0.12)}

/* Dark vignette overlay */
#vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.65) 100%)}

/* Film grain overlay */
#grain{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:256px 256px}
#weather{position:fixed;inset:0;z-index:4;pointer-events:none}

#loading{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a0a1a 0%,#000 70%);transition:opacity 1s}
#loading.done{opacity:0;pointer-events:none}
.cosmic-loader{position:relative;width:140px;height:140px}
.cosmic-loader .ring{position:absolute;border-radius:50%;border:1px solid transparent;top:50%;left:50%;transform:translate(-50%,-50%)}
.cosmic-loader .r1{width:120px;height:120px;border-color:rgba(100,180,255,0.25);animation:spin 5s linear infinite}
.cosmic-loader .r2{width:80px;height:80px;border-color:rgba(180,120,255,0.18);animation:spin 7s linear infinite reverse}
.cosmic-loader .r3{width:40px;height:40px;border-color:rgba(255,200,120,0.12);animation:spin 3s linear infinite}
.cosmic-loader .r4{width:100px;height:100px;border-color:rgba(80,200,220,0.08);border-width:1px;border-style:dashed;animation:spin 9s linear infinite reverse}
.cosmic-loader .glow{position:absolute;width:24px;height:24px;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(120,180,255,0.5),transparent 70%);animation:breathe 2.5s ease-in-out infinite}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes breathe{0%,100%{opacity:0.3;transform:translate(-50%,-50%) scale(0.7)}50%{opacity:0.8;transform:translate(-50%,-50%) scale(1.1)}}
@keyframes verseFloat{0%{opacity:0;transform:translateY(10px)}10%{opacity:1;transform:translateY(0)}90%{opacity:1}100%{opacity:0;transform:translateY(-10px)}}
@keyframes timelinePulse{0%,100%{opacity:0.4}50%{opacity:0.8}}

#load-title{color:rgba(180,210,255,0.92);margin-top:30px;font-size:1.3rem;letter-spacing:10px;text-align:center;line-height:1.8;font-weight:300;text-shadow:0 0 40px rgba(100,180,255,0.25),0 0 80px rgba(100,180,255,0.1)}
#load-hint{color:rgba(140,180,220,0.5);margin-top:8px;font-size:12px;letter-spacing:2px;text-align:center;max-width:400px;}

/* HUD - left bottom story panel */
#hud{position:fixed;bottom:20px;left:20px;z-index:10;background:rgba(5,8,18,0.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(80,120,200,0.15);border-radius:14px;padding:14px 18px;color:rgba(180,210,240,0.85);font-size:12px;line-height:1.5;min-width:180px;max-width:280px}
#hud .label{color:rgba(100,140,200,0.5);font-size:8px;text-transform:uppercase;letter-spacing:4px;margin-bottom:2px}
#hud .day{font-size:13px;color:rgba(200,180,130,0.85);letter-spacing:1px;font-weight:500}
#hud .sub{font-size:10px;color:rgba(150,180,220,0.35);margin-top:2px;font-style:italic;line-height:1.4}
#hud .value{font-size:14px;font-weight:500;color:rgba(180,210,240,0.8)}
#hud .bar{height:2px;background:rgba(60,80,140,0.25);border-radius:1px;margin:3px 0 6px;overflow:hidden}
#hud .bar-fill{height:100%;background:linear-gradient(90deg,rgba(80,150,255,0.5),rgba(160,100,255,0.4));border-radius:1px;transition:width 0.3s}
#hud .hud-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:6px;border-top:1px solid rgba(80,120,200,0.08)}
#hud .ges-indicator{display:flex;align-items:center;gap:6px}
#hud .ges-dot{width:6px;height:6px;border-radius:50%;background:rgba(80,180,255,0.5);transition:all 0.2s}
#hud .ges-dot.fist{background:rgba(255,120,80,0.8);box-shadow:0 0 8px rgba(255,120,80,0.4)}
#hud .timeline{display:flex;gap:3px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(80,120,200,0.08)}
#hud .tl-node{flex:1;height:2px;border-radius:1px;background:rgba(60,80,140,0.2);transition:all 0.5s;position:relative}
#hud .tl-node.active{background:rgba(200,180,130,0.6);box-shadow:0 0 6px rgba(200,180,130,0.2)}
#hud .tl-node.past{background:rgba(100,140,200,0.3)}
#hud .tl-node .tl-dot{position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:rgba(60,80,140,0.3);transition:all 0.5s}
#hud .tl-node.active .tl-dot{background:rgba(255,200,120,0.8);box-shadow:0 0 10px rgba(255,200,120,0.3);width:8px;height:8px;top:-3px}

#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(10,15,30,0.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(100,150,220,0.2);border-radius:20px;padding:8px 24px;color:rgba(180,210,240,0.9);font-size:13px;letter-spacing:2px;opacity:0;transition:opacity 0.6s;pointer-events:none;text-align:center;white-space:nowrap}
#toast.on{opacity:1}

/* Day transition overlay */
#day-overlay{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.6s}
#day-overlay.on{opacity:1}
#day-overlay .day-num{font-size:48px;font-weight:200;color:rgba(255,242,225,0.95);letter-spacing:16px;text-shadow:0 0 80px rgba(220,190,130,0.3),0 0 180px rgba(120,140,220,0.15);font-family:'Cormorant Garamond','Georgia',serif}
#day-overlay .day-name{font-size:26px;color:rgba(225,220,245,0.8);letter-spacing:12px;margin-top:8px;font-weight:300}
#day-overlay .day-sub{font-size:12px;color:rgba(150,160,200,0.3);letter-spacing:3px;margin-top:14px;max-width:480px;text-align:center;line-height:1.6;font-style:italic}
#day-overlay .day-poem{font-size:17px;color:rgba(235,245,255,0.88);letter-spacing:7px;margin-top:18px;font-style:italic;font-weight:300;font-family:'Cormorant Garamond','Georgia',serif}
#day-overlay .day-design{font-size:15px;color:rgba(205,220,250,0.7);letter-spacing:4px;margin-top:12px;max-width:600px;text-align:center;line-height:1.8;font-weight:300}
#hud .day-poem{font-size:10px;color:rgba(150,180,220,0.35);margin-top:2px;font-style:italic;letter-spacing:2px}
#hud .hint{font-size:9px;color:rgba(120,150,200,0.25);margin-top:6px;padding-top:5px;border-top:1px solid rgba(80,120,200,0.08);letter-spacing:2px;text-align:center}

/* Verse floating text - top area */
#verse-3d{position:fixed;top:12%;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;text-align:center;opacity:0;transition:opacity 1.5s;width:80%;max-width:700px}
#verse-3d.visible{opacity:1}
#verse-3d p{color:rgba(230,245,255,0.85);font-size:17px;letter-spacing:5px;font-style:italic;line-height:2.0;font-family:'Georgia','Times New Roman',serif;text-shadow:0 0 40px rgba(80,120,200,0.25),0 0 100px rgba(50,80,160,0.12)}

/* Micro-world overlay */
#micro-overlay{position:fixed;bottom:18%;left:50%;transform:translateX(-50%);z-index:31;pointer-events:none;text-align:center;opacity:0;transition:opacity 0.8s}
#micro-overlay.on{opacity:1}
#micro-overlay .micro-name{font-family:'Cormorant Garamond','Georgia',serif;font-size:20px;letter-spacing:8px;color:rgba(255,242,225,0.9);text-shadow:0 0 40px rgba(220,190,130,0.3);margin-bottom:6px}
#micro-overlay .micro-desc{font-family:'Cormorant Garamond','Georgia',serif;font-size:15px;letter-spacing:5px;color:rgba(205,220,250,0.75);max-width:600px;line-height:1.8;text-shadow:0 0 20px rgba(80,120,200,0.15)}

#flash-overlay{position:fixed;inset:0;z-index:25;background:#fff;pointer-events:none;opacity:0;transition:opacity 0.08s}

#skip-btn{position:fixed;bottom:50%;left:50%;transform:translate(-50%,50%);z-index:101;background:rgba(80,140,220,0.1);border:1px solid rgba(80,140,220,0.25);color:rgba(180,210,240,0.85);padding:10px 28px;border-radius:20px;font-size:14px;cursor:pointer;display:none;letter-spacing:3px;transition:all 0.3s}
#skip-btn:hover{background:rgba(80,140,220,0.2)}

@media(max-width:600px){
  #hud{left:10px;bottom:10px;padding:10px 12px;min-width:130px;max-width:200px;font-size:11px}
  #hud .value{font-size:12px}
  #hud .day{font-size:12px}
  #day-overlay .day-num{font-size:32px;letter-spacing:10px}
  #day-overlay .day-name{font-size:18px;letter-spacing:8px}
  #day-overlay .day-poem{font-size:14px;letter-spacing:5px;margin-top:14px}
  #day-overlay .day-design{font-size:12px;letter-spacing:3px;max-width:360px;margin-top:8px}
  #toast{font-size:11px;padding:6px 14px;white-space:normal}
  video{width:120px;opacity:0.1}
  #verse-3d{top:8%;width:90%}
  #verse-3d p{font-size:13px;letter-spacing:3px}
  #micro-overlay{bottom:14%}#micro-overlay .micro-name{font-size:15px;letter-spacing:5px}#micro-overlay .micro-desc{font-size:12px;letter-spacing:3px;max-width:360px}
}
/* Mobile nav buttons */
#mobile-nav{position:fixed;bottom:0;left:0;right:0;z-index:15;display:flex;justify-content:space-between;pointer-events:none;height:calc(100% - 100px);top:0;padding:60px 0 40px;opacity:0;transition:opacity 0.8s}
#mobile-nav.show{opacity:1}
#mobile-nav .nav-btn{pointer-events:auto;width:40%;height:100%;background:none;border:none;cursor:pointer;position:relative;transition:background 0.3s;outline:none;-webkit-tap-highlight-color:transparent}
#mobile-nav .nav-btn:active{background:rgba(80,140,220,0.08)}
#mobile-nav .nav-btn .arrow{position:absolute;top:50%;transform:translateY(-50%);font-size:36px;color:rgba(180,210,240,0.12);letter-spacing:0;transition:color 0.3s;text-shadow:0 0 20px rgba(80,140,220,0.08)}
#mobile-nav .nav-btn:active .arrow{color:rgba(180,210,240,0.45)}
#mobile-nav .nav-prev .arrow{left:12px}
#mobile-nav .nav-next .arrow{right:12px}

#summary-overlay{position:fixed;inset:0;z-index:32;pointer-events:none;opacity:0;transition:opacity 1.5s;background:radial-gradient(ellipse at center,rgba(8,4,2,0.4) 0%,rgba(8,4,2,0.7) 100%)}
#summary-overlay.on{opacity:1}
#summary-overlay .seg{position:absolute;top:50%;left:50%;width:70%;max-width:680px;text-align:center;opacity:0;transition:opacity 1.8s,transform 1.8s;transform:translate(-50%,-50%) translateY(20px);pointer-events:none}
#summary-overlay .seg.active{opacity:1;transform:translate(-50%,-50%) translateY(0)}
#summary-overlay .seg-title{font-family:'Cormorant Garamond','Georgia',serif;font-size:20px;letter-spacing:10px;color:rgba(230,200,160,0.95);margin-bottom:18px;font-weight:300}
#summary-overlay .seg-text{font-size:14px;letter-spacing:2px;line-height:2.0;color:rgba(210,190,165,0.82);font-weight:300;margin-bottom:14px}
#summary-overlay .seg-quote{font-size:13px;font-style:italic;letter-spacing:2px;line-height:1.8;color:rgba(200,180,145,0.5)}
#summary-overlay .seg-source{font-size:11px;letter-spacing:3px;color:rgba(180,160,130,0.35);margin-top:4px}
#summary-overlay .seg-divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(200,180,130,0.3),transparent);margin:10px auto}
#credits{position:fixed;bottom:10%;left:50%;transform:translateX(-50%);z-index:33;font-size:11px;letter-spacing:6px;color:rgba(180,160,130,0.4);opacity:0;transition:opacity 2s;pointer-events:none;font-weight:300}
#credits.show{opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<video id="v" autoplay playsinline muted></video>
<div id="vignette"></div>
<div id="grain"></div>
<canvas id="weather"></canvas>
<div id="verse-3d"><p id="verse-3d-text"></p></div>
<div id="loading"><div class="cosmic-loader"><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="ring r4"></div><div class="glow"></div></div><p id="load-title">创世之掌 · 七日谈</p><p id="load-hint">起初，神创造天地……适合手机端的创世之旅</p><button id="skip-btn">进入宇宙</button></div>
<div id="day-overlay"><div class="day-num" id="day-num"></div><div class="day-name" id="day-name"></div><div class="day-poem" id="day-poem"></div><div class="day-design" id="day-design"></div><div class="day-sub" id="day-sub"></div></div>
<div id="micro-overlay"><div class="micro-name" id="micro-name"></div><div class="micro-desc" id="micro-desc"></div></div>
<div id="flash-overlay"></div>
<div id="summary-overlay"></div>
<div id="credits">制作 lalalaure</div>
<div id="toast"></div>
<div id="mobile-nav"><button class="nav-btn nav-prev" id="nav-prev"><span class="arrow">‹</span></button><button class="nav-btn nav-next" id="nav-next"><span class="arrow">›</span></button></div>
<audio id="bgm0" preload="none" loop></audio>
<audio id="bgm1" preload="none" loop></audio>
<audio id="bgm2" preload="none" loop></audio>
<audio id="bgm3" preload="none" loop></audio>
<audio id="bgm4" preload="none" loop></audio>
<audio id="bgm5" preload="none" loop></audio>
<audio id="bgm6" preload="none" loop></audio>
<audio id="bgm-switch" preload="none"></audio>
<div id="hud">
  <div class="label">创世之掌</div>
  <div class="day" id="day-display">🌌 虚空</div>
  <div class="day-poem" id="day-poem-display"></div>
  <div class="hud-row">
    <div class="ges-indicator"><span class="ges-dot" id="ges-dot"></span><span class="value" id="ges-name">🖐</span></div>
    <span style="font-size:10px;opacity:0.4"><span id="fps">-- FPS</span></span>
  </div>
  <div class="label">宇宙脉动</div><div class="bar"><div class="bar-fill" id="dens-bar" style="width:100%"></div></div>
  <div class="timeline" id="timeline"></div>
  <div class="hint" id="hint-display"></div>
</div>
<script>
// File protocol guard
if(location.protocol!=='http:'&&location.protocol!=='https:'){
  document.getElementById('load-title').innerHTML='⚠️ 请用 Live Server 打开';
  document.getElementById('load-hint').innerHTML='右键 index.html → "Open with Live Server"<br><br>✨ 或用任意 HTTP 服务器运行';
}
</script>
<script src="lib/three.min.js"></script>
<script>
!function(){
"use strict";
const T=THREE;

// ========== DOM ==========
const $=id=>document.getElementById(id);
const $title=$('load-title'),$hint=$('load-hint'),$load=$('loading'),$skip=$('skip-btn');
const $toast=$('toast'),$dayOver=$('day-overlay'),$dayNum=$('day-num'),$dayName=$('day-name'),$daySub=$('day-sub'),$flash=$('flash-overlay');
const $gesN=$('ges-name'),$densB=$('dens-bar'),$fps=$('fps'),$dayD=$('day-display'),$gesDot=$('ges-dot');
const $dayPoem=$('day-poem'),$dayDesign=$('day-design'),$dayPoemDisplay=$('day-poem-display'),$hintDisplay=$('hint-display');
const $verse3d=$('verse-3d'),$verse3dText=$('verse-3d-text'),$timeline=$('timeline');
const $weather=$('weather');let wctx=null;try{wctx=$weather?$weather.getContext('2d'):null;}catch(e){}
const video=$('v'),canvas=$('c');
const $microOver=$('micro-overlay'),$microName=$('micro-name'),$microDesc=$('micro-desc');
const $summaryOver=$('summary-overlay'),$credits=$('credits');
const $navPrev=$('nav-prev'),$navNext=$('nav-next');
const $mobileNav=$('mobile-nav');
const isHTTP=location.protocol==='http:'||location.protocol==='https:';
const isMobile=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(navigator.userAgent);
let touchStartX=0,touchStartY=0,touchDist=0,touchCount=0,lastTap=0,mobileYawOffset=0;
function setLoad(t,h){$title.textContent=t;$hint.textContent=h||'';}
function toast(m){$toast.textContent=m;$toast.classList.add('on');clearTimeout(toast._t);toast._t=setTimeout(()=>$toast.classList.remove('on'),2800);}

// ========== THREE.JS ==========
const renderer=new T.WebGLRenderer({canvas,antialias:true,depth:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=T.ACESFilmicToneMapping;renderer.toneMappingExposure=0.9;

const scene=new T.Scene();scene.background=new T.Color(0x000003);scene.fog=new T.FogExp2(0x000006,0.000025);
const camera=new T.PerspectiveCamera(50,innerWidth/innerHeight,0.05,500);
camera.position.set(0,2,20);camera.lookAt(0,0,0);

const ambLight=new T.AmbientLight(0x080612,0.4);scene.add(ambLight);
const coreLight=new T.PointLight(0x7799dd,18,50);coreLight.position.set(0,0,0);scene.add(coreLight);
const cl2=new T.PointLight(0x7755bb,12,55);cl2.position.set(14,6,-10);scene.add(cl2);
const cl3=new T.PointLight(0x5577cc,12,55);cl3.position.set(-14,-4,10);scene.add(cl3);

// Deep purple ambient shadow layer
const shadowLight=new T.PointLight(0x332244,6,40);shadowLight.position.set(-8,10,-5);scene.add(shadowLight);
const shadowLight2=new T.PointLight(0x221133,5,35);shadowLight2.position.set(10,-5,8);scene.add(shadowLight2);

// ========== INLINE BLOOM (simple brightness-extract + blur composite) ==========
let bloomTarget=0.5,bloomCurrent=0.5;
const _rt=(w,h)=>new T.WebGLRenderTarget(w,h,{type:T.HalfFloatType,minFilter:T.LinearFilter,magFilter:T.LinearFilter,format:T.RGBAFormat});
let bloomW=Math.floor(innerWidth/2),bloomH=Math.floor(innerHeight/2);
const _bVert=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1);}`;
const _bloomQuad=new T.Mesh(new T.PlaneGeometry(2,2),new T.MeshBasicMaterial());
const _bloomScene=new T.Scene();_bloomScene.add(_bloomQuad);
const _bloomCam=new T.OrthographicCamera(-1,1,1,-1,0,1);

const brightMat=new T.ShaderMaterial({
  uniforms:{tDiffuse:{value:null},th:{value:0.15}},
  vertexShader:_bVert,fragmentShader:`uniform sampler2D tDiffuse;uniform float th;varying vec2 vUv;void main(){vec4 c=texture2D(tDiffuse,vUv);float b=max(c.r,max(c.g,c.b))-th;if(b>0.0)gl_FragColor=c*b/(1.0-th);else gl_FragColor=vec4(0);}`
});
const blurH=new T.ShaderMaterial({
  uniforms:{tDiffuse:{value:null},dir:{value:new T.Vector2(1,0)},res:{value:new T.Vector2(bloomW,bloomH)}},
  vertexShader:_bVert,fragmentShader:`uniform sampler2D tDiffuse;uniform vec2 dir;uniform vec2 res;varying vec2 vUv;void main(){vec2 px=1.0/res;vec4 c=vec4(0);float w=0.0;for(int i=-5;i<=5;i++){float d=float(i);float f=exp(-d*d*0.15);c+=texture2D(tDiffuse,vUv+dir*d*px)*f;w+=f;}gl_FragColor=c/w;}`
});
const blurV=new T.ShaderMaterial({
  uniforms:{tDiffuse:{value:null},dir:{value:new T.Vector2(0,1)},res:{value:new T.Vector2(bloomW,bloomH)}},
  vertexShader:_bVert,fragmentShader:`uniform sampler2D tDiffuse;uniform vec2 dir;uniform vec2 res;varying vec2 vUv;void main(){vec2 px=1.0/res;vec4 c=vec4(0);float w=0.0;for(int i=-5;i<=5;i++){float d=float(i);float f=exp(-d*d*0.15);c+=texture2D(tDiffuse,vUv+dir*d*px)*f;w+=f;}gl_FragColor=c/w;}`
});
const compMat=new T.ShaderMaterial({
  uniforms:{tDiffuse:{value:null},tBloom:{value:null},str:{value:0.5}},
  vertexShader:_bVert,fragmentShader:`uniform sampler2D tDiffuse;uniform sampler2D tBloom;uniform float str;varying vec2 vUv;void main(){vec4 c=texture2D(tDiffuse,vUv);vec4 b=texture2D(tBloom,vUv);gl_FragColor=c+b*str;}`
});
const copyMat=new T.MeshBasicMaterial({map:null,transparent:true,opacity:1});

// Bloom render targets
const fullRT=_rt(innerWidth,innerHeight);
const bloomRT=_rt(innerWidth,innerHeight);
const halfRT=_rt(bloomW,bloomH);
const halfRT2=_rt(bloomW,bloomH);

function renderBloom(){
  const s=bloomCurrent;
  // 1. Render scene to fullRT
  renderer.setRenderTarget(fullRT);
  renderer.render(scene,camera);
  // 2. Bloom pipeline, composite to bloomRT
  if(s>=0.05){
    copyMat.map=fullRT.texture;_bloomQuad.material=copyMat;
    renderer.setRenderTarget(halfRT);
    renderer.render(_bloomScene,_bloomCam);
    brightMat.uniforms.tDiffuse.value=halfRT.texture;
    brightMat.uniforms.th.value=Math.max(0.2,0.3-s*0.04);
    _bloomQuad.material=brightMat;
    renderer.setRenderTarget(halfRT2);
    renderer.render(_bloomScene,_bloomCam);
    blurH.uniforms.tDiffuse.value=halfRT2.texture;
    _bloomQuad.material=blurH;
    renderer.setRenderTarget(halfRT);
    renderer.render(_bloomScene,_bloomCam);
    blurV.uniforms.tDiffuse.value=halfRT.texture;
    _bloomQuad.material=blurV;
    renderer.setRenderTarget(halfRT2);
    renderer.render(_bloomScene,_bloomCam);
    compMat.uniforms.tDiffuse.value=fullRT.texture;
    compMat.uniforms.tBloom.value=halfRT2.texture;
    compMat.uniforms.str.value=s*0.35;
    _bloomQuad.material=compMat;
    renderer.setRenderTarget(bloomRT);
    renderer.render(_bloomScene,_bloomCam);
  }else{
    // No bloom: copy fullRT to bloomRT for micro composite
    copyMat.map=fullRT.texture;_bloomQuad.material=copyMat;
    renderer.setRenderTarget(bloomRT);
    renderer.render(_bloomScene,_bloomCam);
  }
  // 3. Copy bloomRT to screen
  copyMat.map=bloomRT.texture;_bloomQuad.material=copyMat;
  renderer.setRenderTarget(null);
  renderer.render(_bloomScene,_bloomCam);
  // 4. Micro overlay
  if(microAlpha>0.01&&currentDay>=0)renderMicroOverlay();
}
function renderMicroOverlay(){
  if(!(microAlpha>0.01&&currentDay>=0))return;
  const mw=microWorlds[currentDay];
  if(!mw)return;
  microCam.aspect=innerWidth/innerHeight;microCam.updateProjectionMatrix();
  // Render micro scene to microRT
  renderer.setRenderTarget(microRT);
  renderer.render(microScene,microCam);
  renderer.setRenderTarget(null);
  // Composite micro over bloom result (bloomRT has the composite bloom output)
  microQuadMat.uniforms.tMicro.value=microRT.texture;
  microQuadMat.uniforms.tMacro.value=bloomRT.texture;
  microQuadMat.uniforms.alpha.value=microAlpha;
  _bloomQuad.material=microQuadMat;
  renderer.render(_bloomScene,_bloomCam);
}

function bloomBurst(intensity=1.5){
  bloomTarget=Math.min(intensity,2.0);
  setTimeout(()=>bloomTarget=0.35,intensity>1.5?600:400);

function gauss(m,s){let u;while(!(u=Math.random())){}return m+s*Math.sqrt(-2*Math.log(u))*Math.cos(6.2831853*Math.random());}
function rColor(h,s,l){return new T.Color().setHSL(h,s,l);}
function ema(c,t,a){return c+(t-c)*a;}

function createGlowTex(size){
  const c=document.createElement('canvas');c.width=size||64;c.height=size||64;
  const ctx=c.getContext('2d'),grad=ctx.createRadialGradient(c.width/2,c.height/2,0,c.width/2,c.height/2,c.width/2);
  grad.addColorStop(0,'rgba(255,255,255,1)');grad.addColorStop(0.1,'rgba(255,255,255,0.9)');
  grad.addColorStop(0.4,'rgba(200,220,255,0.5)');grad.addColorStop(0.7,'rgba(100,150,255,0.1)');grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,c.width,c.height);
  const tex=new T.CanvasTexture(c);tex.needsUpdate=true;return tex;
}
function createStarTex(size){
  const c=document.createElement('canvas');c.width=size||80;c.height=size||80;
  const ctx=c.getContext('2d'),cx=c.width/2,cy=c.height/2,r=cx*0.9,n=5;
  ctx.beginPath();
  for(let i=0;i<n*2;i++){const rr=i%2===0?r:r*0.35,a=i*Math.PI/n-Math.PI/2,x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.closePath();
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,cx);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.2,'rgba(255,220,180,0.85)');g.addColorStop(0.6,'rgba(200,150,255,0.25)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fill();
  const tex=new T.CanvasTexture(c);tex.needsUpdate=true;return tex;
}
function createCrossTex(size){
  const c=document.createElement('canvas');c.width=size||64;c.height=size||64;
  const ctx=c.getContext('2d'),cx=c.width/2,cy=c.height/2,len=cx*0.9,w=4;
  ctx.beginPath();ctx.moveTo(cx,cy-len);ctx.lineTo(cx,cy+len);ctx.moveTo(cx-len,cy);ctx.lineTo(cx+len,cy);
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=w;ctx.stroke();
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,cx);g.addColorStop(0,'rgba(255,255,255,0.8)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);
  const tex=new T.CanvasTexture(c);tex.needsUpdate=true;return tex;
}
const glowTex=createGlowTex(),starTex=createStarTex(),crossTex=createCrossTex();

function mkGlowPts(N,posFn,size,op,bl,tex){
  const g=new T.BufferGeometry(),p=new Float32Array(N*3),c=new Float32Array(N*3);
  for(let i=0;i<N;i++){const r=posFn(i,N);p[i*3]=r[0];p[i*3+1]=r[1];p[i*3+2]=r[2];c[i*3]=r[3];c[i*3+1]=r[4];c[i*3+2]=r[5];}
  g.setAttribute('position',new T.BufferAttribute(p,3));g.setAttribute('color',new T.BufferAttribute(c,3));
  const m=new T.PointsMaterial({size,vertexColors:true,blending:bl||T.AdditiveBlending,depthWrite:false,transparent:true,opacity:op,map:tex||glowTex});
  const pts=new T.Points(g,m);pts._N=N;pts._bp=p;pts._bc=c;return pts;
}

let wParticles=[],wFog=[],wDay=-1;
function initWeather(){if($weather&&!wctx)try{wctx=$weather.getContext('2d');}catch(e){}if($weather){$weather.width=innerWidth;$weather.height=innerHeight;}}
function setWeather(dayIdx){
  wParticles=[];wFog=[];wDay=dayIdx;const cfg=WTHR[dayIdx];if(!cfg)return;
  if(cfg.fog)wFog=cfg.fog.map(f=>({...f}));
  if(!cfg.pFn)return;
  for(let i=0;i<cfg.N;i++)wParticles.push(cfg.pFn(i,cfg.N));
}
const WTHR=[
  {N:200,pFn:(i,N)=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-0.5)*20,vy:-(30+Math.random()*40),s:1.5+Math.random()*2.5,a:0.15+Math.random()*0.25,c:'255,230,180'})},

  {N:1500,pFn:(i,N)=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:0.5+Math.random()*1.5,a:0.2+Math.random()*0.5,c:'255,245,220',flick:0})},
  {N:0,fog:[{opacity:0.12,color:'rgba(180,100,180,0.04)'},{opacity:0.1,color:'rgba(130,160,220,0.035)'},{opacity:0.08,color:'rgba(200,120,160,0.03)'}]},
  {N:800,pFn:(i,N)=>({x:Math.random()*innerWidth,y:-Math.random()*innerHeight*0.5,s:1.5+Math.random()*2.5,a:0.3+Math.random()*0.4,c:'80,225,210',vy:50+Math.random()*70,vx:(Math.random()-0.5)*40})},
  {N:2000,pFn:(i,N)=>({x:Math.random()*innerWidth,y:innerHeight+Math.random()*80,s:1.5+Math.random()*2.5,a:0.15+Math.random()*0.45,c:'255,210,130',vy:-(40+Math.random()*60),vx:(Math.random()-0.5)*25})},
  {N:500,pFn:(i,N)=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:3+Math.random()*4,a:0.2+Math.random()*0.4,c:'255,250,240',vy:15+Math.random()*25,vx:(Math.random()-0.5)*15,rot:Math.random()*6.28,rsp:(Math.random()-0.5)*2})},
  {N:0,pFn:null}
];
function updateWeather(dt,t){
  if(microAlpha>0.05||dayTransition.active){if(wctx)wctx.clearRect(0,0,innerWidth,innerHeight);return;}
  const cfg=WTHR[wDay];if(!cfg||!$weather||!wctx){return;}
  const W=innerWidth,H=innerHeight;
  wctx.clearRect(0,0,W,H);
  for(const f of wFog){wctx.globalAlpha=f.opacity;wctx.fillStyle=f.color;wctx.fillRect(0,0,W,H);wctx.globalAlpha=1;}
  if(wParticles.length===0)return;
  if(wDay===0){
    for(const p of wParticles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.a-=dt*0.06;if(p.y<-10||p.a<=0){p.y=H+10;p.x=Math.random()*W;p.a=0.15+Math.random()*0.25;}wctx.fillStyle='rgba('+p.c+','+p.a+')';wctx.beginPath();wctx.arc(p.x,p.y,p.s,0,Math.PI*2);wctx.fill();}
  }else if(wDay===1){
    for(const p of wParticles){p.x+=Math.sin(p.l+p.y*0.008)*dt*15;p.y+=p.sp*dt;if(p.y>H+5){p.y=-5;p.x=Math.random()*W;}wctx.strokeStyle='rgba('+p.c+','+p.a+')';wctx.lineWidth=0.8;wctx.beginPath();wctx.moveTo(p.x,p.y);wctx.lineTo(p.x-Math.sin(p.l+p.y*0.008)*p.l*0.15,p.y-p.l);wctx.stroke();}
  }else if(wDay===2){
    for(const p of wParticles){p.y+=18*dt;p.x+=Math.sin(p.y*0.02+t)*4*dt;if(p.y>H+5){p.y=-5;p.x=Math.random()*W;}const fl=0.5+Math.sin(t*3+p.x*0.1)*0.5;wctx.fillStyle='rgba('+p.c+','+(p.a*fl)+')';wctx.beginPath();wctx.arc(p.x,p.y,p.s,0,Math.PI*2);wctx.fill();}
  }else if(wDay===3){
  }else if(wDay===4){
    for(const p of wParticles){p.x+=p.vx*dt+Math.sin(p.y*0.02+t)*12*dt;p.y+=p.vy*dt;p.a-=dt*0.12;if(p.a<=0||p.y>H+20){p.y=-10;p.x=Math.random()*W;p.a=0.3+Math.random()*0.4;}const grad=wctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.s);grad.addColorStop(0,'rgba('+p.c+','+p.a+')');grad.addColorStop(0.5,'rgba('+p.c+','+(p.a*0.2)+')');grad.addColorStop(1,'rgba('+p.c+',0)');wctx.fillStyle=grad;wctx.beginPath();wctx.arc(p.x,p.y,p.s,0,Math.PI*2);wctx.fill();}
  }else if(wDay===5){
    for(const p of wParticles){p.x+=p.vx*dt+Math.sin(p.y*0.03+t*0.5)*6*dt;p.y+=p.vy*dt;p.a-=dt*0.08;if(p.a<=0||p.y<-20){p.y=H+10;p.x=Math.random()*W;p.a=0.15+Math.random()*0.45;}wctx.fillStyle='rgba('+p.c+','+p.a+')';wctx.beginPath();wctx.arc(p.x,p.y,p.s,0,Math.PI*2);wctx.fill();}
  }else if(wDay===6){
    for(const p of wParticles){p.x+=Math.sin(p.rot+p.y*0.015)*12*dt;p.y+=p.vy*dt;p.rot+=p.rsp*dt;p.a-=dt*0.02;if(p.y>H+20||p.a<=0){p.y=-20;p.x=Math.random()*W;p.a=0.2+Math.random()*0.4;}wctx.save();wctx.translate(p.x,p.y);wctx.rotate(p.rot);wctx.fillStyle='rgba('+p.c+','+p.a+')';wctx.beginPath();wctx.ellipse(0,0,p.s,p.s*0.5,0,0,Math.PI*2);wctx.fill();wctx.restore();}
  }
}

// Narrative particle systems
const daySystems=[];
function createNarrativeParticles(N,genPos,genCol,size,op){
  const rest=new Float32Array(N*3),pos=new Float32Array(N*3),col=new Float32Array(N*3),c3=new T.Color();
  for(let i=0;i<N;i++){const p=genPos(i,N),cc=genCol(i,N,c3);rest[i*3]=p[0];rest[i*3+1]=p[1];rest[i*3+2]=p[2];pos[i*3]=p[0];pos[i*3+1]=p[1];pos[i*3+2]=p[2];col[i*3]=cc[0];col[i*3+1]=cc[1];col[i*3+2]=cc[2];}
  const geo=new T.BufferGeometry();geo.setAttribute('position',new T.BufferAttribute(pos,3));geo.setAttribute('color',new T.BufferAttribute(col,3));
  const mat=new T.PointsMaterial({size:size||0.15,vertexColors:true,blending:T.AdditiveBlending,depthWrite:false,transparent:true,opacity:0,map:glowTex});
  const pts=new T.Points(geo,mat);pts._N=N;pts._rest=rest;pts._pos=pos;pts._col=col;pts._mat=mat;pts._geo=geo;pts._vel=new Float32Array(N*3);pts.visible=false;
  return pts;
}

// ========== MICRO-WORLD GENERATORS ==========
const _gTex=glowTex;
function _mPts(pos,col,size,op){const N=pos.length/3,g=new T.BufferGeometry(),p=new Float32Array(pos),c=new Float32Array(col);g.setAttribute('position',new T.BufferAttribute(p,3));g.setAttribute('color',new T.BufferAttribute(c,3));return new T.Points(g,new T.PointsMaterial({size,vertexColors:true,blending:T.AdditiveBlending,depthWrite:false,transparent:true,opacity:op,map:_gTex}));}
function _mPtsV(pos,col,sizes,op){const N=pos.length/3,g=new T.BufferGeometry(),p=new Float32Array(pos),c=new Float32Array(col),s=new Float32Array(sizes);g.setAttribute('position',new T.BufferAttribute(p,3));g.setAttribute('color',new T.BufferAttribute(c,3));g.setAttribute('size',new T.BufferAttribute(s,1));const mat=new T.ShaderMaterial({uniforms:{uTex:{value:_gTex},uOp:{value:op}},vertexShader:'attribute float size;attribute vec3 color;varying vec3 vColor;void main(){vColor=color;vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=size*(300.0/-mv.z);gl_Position=projectionMatrix*mv;}',fragmentShader:'uniform sampler2D uTex;uniform float uOp;varying vec3 vColor;void main(){vec4 t=texture2D(uTex,gl_PointCoord);gl_FragColor=vec4(vColor*t.rgb,t.a*uOp);}',transparent:true,blending:T.AdditiveBlending,depthWrite:false});return new T.Points(g,mat);}
function _mNormalPts(pos,col,size,op){const N=pos.length/3,g=new T.BufferGeometry(),p=new Float32Array(pos),c=new Float32Array(col);g.setAttribute('position',new T.BufferAttribute(p,3));g.setAttribute('color',new T.BufferAttribute(c,3));return new T.Points(g,new T.PointsMaterial({size,vertexColors:true,blending:T.NormalBlending,depthWrite:false,transparent:true,opacity:op,sizeAttenuation:true}));}
function _mGroundPts(n,r,g,b,s,yOff){const p=[],c=[];for(let i=0;i<n;i++){const a=Math.random()*6.2832,rd=Math.random()*0.5;const v=0.3+Math.random()*0.7;p.push(Math.cos(a)*rd,(yOff||-0.1)+Math.random()*0.005,Math.sin(a)*rd);c.push(r*v,g*v,b*v);}return _mNormalPts(p,c,s||0.003,0.95);}
function _mHouseDense(x,y,z,w,h,d,r,g,b,rr,rg,rb){const p=[],c=[];const st=0.003;const hw=w*0.5,hd=d*0.5,hh=h*0.7;for(let i=-hw;i<=hw;i+=st)for(let j=0;j<=hh;j+=st){p.push(x+i,y+j,z-hd);c.push(r,g,b);p.push(x+i,y+j,z+hd);c.push(r*0.7,g*0.7,b*0.7);}for(let k=-hd;k<=hd;k+=st)for(let j=0;j<=hh;j+=st){p.push(x-hw,y+j,z+k);c.push(r*0.85,g*0.85,b*0.85);p.push(x+hw,y+j,z+k);c.push(r*0.85,g*0.85,b*0.85);}for(let i=0;i<3000;i++){const t=Math.pow(Math.random(),0.5),rr2=t*w*0.35,a=Math.random()*6.2832;p.push(x+Math.cos(a)*rr2,y+hh+(1-t)*h*0.5+t*0.02,z+Math.sin(a)*rr2*d/w);c.push(rr,rg,rb);}const wp=[],wc=[];for(let i=0;i<50;i++){wp.push(x+(Math.random()-0.5)*w*0.35,y+h*0.15+Math.random()*h*0.35,z+hd+0.003);wc.push(1,0.85,0.3+Math.random()*0.3);}const g2=new T.Group();g2.add(_mNormalPts(p,c,0.002,0.85));g2.add(_mPts(wp,wc,0.004,0.8));return g2;}
function _mTreeDense(x,y,z,trH,crR,trR2,trG2,trB2,crR2,crG2,crB2){const p=[],c=[];for(let i=0;i<5000;i++){const a=Math.random()*6.2832,t=Math.random(),rad=0.004+t*0.01;p.push(x+Math.cos(a)*rad,y+t*trH,z+Math.sin(a)*rad);const sh=0.4+Math.random()*0.6;c.push(trR2*sh,trG2*sh,trB2*sh);}for(let i=0;i<10000;i++){const t=Math.pow(Math.random(),0.4),a=Math.random()*6.2832,ph=Math.acos(2*Math.random()-1),rd=crR*t;p.push(x+Math.sin(ph)*Math.cos(a)*rd+gauss(0,0.002),y+trH+Math.cos(ph)*rd*0.9+gauss(0,0.002),z+Math.sin(ph)*Math.sin(a)*rd+gauss(0,0.002));const sh=0.3+Math.random()*0.7;c.push(crR2*sh,crG2*sh,crB2*sh);}const fp=[],fc=[];for(let i=0;i<2000;i++){const a=Math.random()*6.2832,r=crR*0.8*Math.random()*0.3;fp.push(x+Math.cos(a)*r+gauss(0,0.003),y+trH*0.5+Math.random()*trH*0.3,gauss(0,0.003));fc.push(0.15+Math.random()*0.1,0.08+Math.random()*0.05,0.05);}const g2=new T.Group();g2.add(_mNormalPts(p,c,0.002,0.75));g2.add(_mPts(fp,fc,0.002,0.08));return g2;}
function _mPersonDense(x,y,z,s){const sc=s*0.07,hw=sc*0.25;const p=[],c=[];for(let i=0;i<200;i++){p.push(gauss(0,0.002),sc+gauss(0,0.002),gauss(0,0.002));c.push(0.9,0.75,0.6);}for(let i=0;i<400;i++){const r2=hw*Math.sqrt(Math.random()),a=Math.random()*6.2832;p.push(Math.cos(a)*r2+gauss(0,0.002),sc*0.8+gauss(0,0.003),Math.sin(a)*r2+gauss(0,0.002));c.push(0.7,0.55,0.4);}for(let i=0;i<300;i++){const t=Math.random();p.push(gauss(0,0.002),sc*0.75-t*sc*0.6,gauss(0,0.002));c.push(0.5,0.35,0.25);}for(let i=0;i<250;i++){p.push(-hw*1.1+gauss(0,0.003),sc*0.7-Math.random()*sc*0.45,gauss(0,0.003));c.push(0.7,0.55,0.4);p.push(hw*1.1+gauss(0,0.003),sc*0.7-Math.random()*sc*0.45,gauss(0,0.003));c.push(0.7,0.55,0.4);}for(let i=0;i<250;i++){p.push(-hw*0.3+gauss(0,0.002),sc*0.4-Math.random()*sc*0.4,gauss(0,0.002));c.push(0.35,0.25,0.15);p.push(hw*0.3+gauss(0,0.002),sc*0.4-Math.random()*sc*0.4,gauss(0,0.002));c.push(0.35,0.25,0.15);}const g2=new T.Group();g2.add(_mNormalPts(p,c,0.0015,0.85));g2.position.set(x,y,z);return g2;}
function _mDeerDense(x,y,z,s){const sc=s*0.05,hw=sc*0.35;const p=[],c=[];for(let i=0;i<400;i++){p.push(gauss(0,hw*0.2),sc*0.5+gauss(0,0.002),gauss(0,hw*0.1));c.push(0.55,0.4,0.25);}for(let i=0;i<200;i++){const t=Math.random();p.push(gauss(0,0.002),sc*0.5+t*sc*0.3,gauss(0,0.002));c.push(0.5,0.35,0.2);}for(let i=0;i<150;i++){p.push(gauss(0,0.002),sc*0.75+gauss(0,0.002),gauss(0,0.002));c.push(0.6,0.45,0.2);}for(let i=0;i<180;i++){const side=i%2===0?-1:1;p.push(gauss(side*hw*0.2,0.002),sc*0.1+gauss(0,0.002),gauss(0,0.002));c.push(0.35,0.25,0.15);}for(let i=0;i<220;i++){const side=i%2===0?-1:1;p.push(gauss(side*hw*0.15,0.002),sc*0.2+gauss(0,0.002),gauss(0,0.002));c.push(0.35,0.25,0.15);}for(let i=0;i<250;i++){const a=Math.random()*6.2832,r=hw*0.1*Math.random();p.push(Math.cos(a)*r+gauss(0,0.002),sc*0.5+gauss(0,0.005),Math.sin(a)*r+gauss(0,0.002));c.push(0.4,0.3,0.2);}const g2=new T.Group();g2.add(_mNormalPts(p,c,0.002,0.8));g2.position.set(x,y,z);return g2;}
function _mBirdDense(x,y,z,s){const w=s*0.03;const p=[],c=[];for(let i=0;i<200;i++){p.push(gauss(0,0.002),gauss(0,0.002),gauss(0,w*0.06));c.push(0.7,0.5,0.3);}for(let i=0;i<400;i++){const side=i%2===0?-1:1,t=Math.random();p.push(side*Math.pow(t,0.5)*w*0.6+gauss(0,0.002),Math.sin(t*Math.PI)*w*0.25+gauss(0,0.002),gauss(0,0.002));c.push(0.6,0.4,0.2);}for(let i=0;i<200;i++){p.push(w*0.3+gauss(0,0.002),gauss(0,0.002),gauss(0,0.002));c.push(0.75,0.55,0.3);}for(let i=0;i<200;i++){const side=i%2===0?-1:1,t=Math.random();p.push(side*w*0.1+gauss(0,0.002),gauss(0,0.003),Math.sin(t*Math.PI)*w*0.1+gauss(0,0.002));c.push(0.5,0.35,0.2);}const g2=new T.Group();g2.add(_mNormalPts(p,c,0.002,0.75));g2.position.set(x,y,z);return g2;}

function _mPineDense(x,y,z,h){const p=[],c=[];for(let i=0;i<8000;i++){const t=Math.pow(Math.random(),0.4),a=Math.random()*6.2832,r=t*h*0.15;const yPos=y+h*(1-t);p.push(x+Math.cos(a)*r+gauss(0,0.001),yPos,z+Math.sin(a)*r+gauss(0,0.001));const sh=0.3+Math.random()*0.7;if(t<0.3)c.push(0.08*sh,0.15*sh,0.04*sh);else if(t<0.7)c.push(0.06*sh,0.12*sh,0.03*sh);else c.push(0.04*sh,0.08*sh,0.02*sh);}return _mNormalPts(p,c,0.002,0.8);}
function _mFenceDense(x1,z1,x2,z2,h){const p=[],c=[];const dx=x2-x1,dz=z2-z1,dist=Math.sqrt(dx*dx+dz*dz);const ux=dx/dist,uz=dz/dist;const steps=Math.max(4,Math.floor(dist/0.008));for(let i=0;i<=steps;i++){const t=i/steps,px=x1+dx*t,pz=z1+dz*t;for(let j=0;j<8;j++){p.push(px+gauss(0,0.003),-0.1+j*h*0.125+gauss(0,0.003),pz+gauss(0,0.003));c.push(0.35,0.25,0.15);}}for(let i=0;i<Math.floor(dist/0.04);i++){const t=(i+0.5)/Math.floor(dist/0.04),px=x1+dx*t,pz=z1+dz*t;for(let j=0;j<3;j++){p.push(px+gauss(0,0.002),-0.1+h+j*0.008+gauss(0,0.002),pz+gauss(0,0.002));c.push(0.25,0.2,0.1);}}return _mNormalPts(p,c,0.002,0.6);}
function _mWellDense(x,y,z){const p=[],c=[];for(let i=0;i<2000;i++){const a=Math.random()*6.2832,r=0.03+Math.random()*0.015;p.push(x+Math.cos(a)*r,y+Math.random()*0.04,z+Math.sin(a)*r);c.push(0.3+Math.random()*0.15,0.22+Math.random()*0.1,0.12+Math.random()*0.05);}for(let i=0;i<600;i++){const a=Math.random()*6.2832,r=0.01+Math.random()*0.01;p.push(x+Math.cos(a)*r,y+0.04+Math.random()*0.005,z+Math.sin(a)*r);c.push(0.1,0.15,0.25);}for(let i=0;i<800;i++){const a=Math.random()*6.2832,t=Math.random(),ra=0.035+(0.05-0.035)*t,rr=0.03*t;p.push(x+Math.cos(a)*ra+gauss(0,0.002),y+0.04+rr,z+Math.sin(a)*ra+gauss(0,0.002));c.push(0.4,0.3,0.15);}for(let i=0;i<200;i++){const a=i*0.0314;p.push(x+Math.cos(a)*0.03,y+0.02+Math.sin(a*2)*0.01,z+Math.sin(a)*0.03);c.push(0.3,0.5,0.7);}return _mNormalPts(p,c,0.002,0.7);}
function _mStallDense(x,y,z,w,h,d){const p=[],c=[];const hw=w*0.5,hd=d*0.5,hh=h*0.5,st=0.004;for(let i=-hw;i<=hw;i+=st)for(let j=0;j<=hh;j+=st){p.push(x+i,y+j,z-hd);c.push(0.5,0.35,0.2);p.push(x+i,y+j,z+hd);c.push(0.4,0.28,0.15);}for(let k=-hd;k<=hd;k+=st)for(let j=0;j<=hh;j+=st){p.push(x-hw,y+j,z+k);c.push(0.45,0.3,0.18);}for(let i=0;i<1500;i++){const t=Math.pow(Math.random(),0.5),a=Math.random()*6.2832,rr=t*w*0.45;const yOff=hh+(1-t)*h*0.5;p.push(x+Math.cos(a)*rr+gauss(0,0.002),y+yOff,z+Math.sin(a)*rr*d/w+gauss(0,0.002));c.push(0.6,0.3,0.1);}for(let i=0;i<200;i++){p.push(x+(Math.random()-0.5)*w*0.6,y+hh*0.3+Math.random()*hh*0.4,z+hd+0.002);c.push(1,0.6,0.15);}return _mNormalPts(p,c,0.002,0.75);}
function _mBushDense(x,y,z,r){const p=[],c=[];for(let i=0;i<4000;i++){const t=Math.pow(Math.random(),0.5),a=Math.random()*6.2832,ph=Math.acos(2*Math.random()-1);p.push(x+Math.sin(ph)*Math.cos(a)*r*t+gauss(0,0.002),y+t*r*0.8+gauss(0,0.002),z+Math.sin(ph)*Math.sin(a)*r*t+gauss(0,0.002));const sh=0.3+Math.random()*0.7;c.push(0.1*sh,0.2*sh,0.06*sh);}return _mNormalPts(p,c,0.002,0.7);}
function _mRockDense(x,y,z,s){const p=[],c=[];for(let i=0;i<2000;i++){const t=Math.pow(Math.random(),0.4),a=Math.random()*6.2832,ph=Math.acos(2*Math.random()-1);p.push(x+Math.sin(ph)*Math.cos(a)*s*t+gauss(0,0.001),y+s*t*0.6+gauss(0,0.002),z+Math.sin(ph)*Math.sin(a)*s*t+gauss(0,0.001));const sh=0.4+Math.random()*0.6;c.push(0.25*sh,0.2*sh,0.12*sh);}return _mNormalPts(p,c,0.0025,0.6);}
function _mFlowerCluster(x,y,z,n,w){const p=[],c=[];for(let i=0;i<n;i++){const a=Math.random()*6.2832,r=w*Math.sqrt(Math.random());p.push(x+Math.cos(a)*r+gauss(0,0.003),y+Math.random()*0.01,z+Math.sin(a)*r+gauss(0,0.003));const hue=Math.random();if(hue<0.33){c.push(0.8+Math.random()*0.2,0.1+Math.random()*0.15,0.1+Math.random()*0.15);}else if(hue<0.66){c.push(0.9+Math.random()*0.1,0.6+Math.random()*0.3,0.05+Math.random()*0.1);}else{c.push(0.5+Math.random()*0.3,0.1+Math.random()*0.2,0.6+Math.random()*0.3);}}return _mPts(p,c,0.003,0.85);}

function createMW0(){const g=new T.Group();g.add(_mGroundPts(15000,0.15,0.07,0.03,0.003));const sun=new T.Mesh(new T.SphereGeometry(0.035,20,20),new T.MeshBasicMaterial({color:0xffaa44}));sun.position.set(0,0.15,0);g.add(sun);const corona=new T.Mesh(new T.RingGeometry(0.04,0.07,32),new T.MeshBasicMaterial({color:0xff8811,transparent:true,opacity:0.25,blending:T.AdditiveBlending,depthWrite:false,side:T.DoubleSide}));corona.position.set(0,0.15,0);corona.rotation.x=Math.PI/2;g.add(corona);const rp=[],rc=[],rs=[];for(let i=0;i<12000;i++){const a=Math.random()*6.2832,t=Math.pow(Math.random(),0.5);rp.push(Math.cos(a)*t*0.35,0.15-t*0.3,Math.sin(a)*t*0.35);rc.push(1,0.5+Math.random()*0.3,0.1+Math.random()*0.1);rs.push(0.003+Math.random()*0.004);}g.add(_mPtsV(rp,rc,rs,0.35));[[-0.2,-0.15],[0.2,-0.15],[-0.15,0.2],[0.15,0.2]].forEach(([px,pz])=>{const pp=[];for(let i=0;i<10000;i++){const a=Math.random()*6.2832,r=0.01+Math.random()*0.03,t=Math.pow(Math.random(),0.5);pp.push(px+Math.cos(a)*r,-0.08+t*0.28,pz+Math.sin(a)*r);}g.add(_mPts(pp,Array.from({length:10000},()=>[1,0.5+Math.random()*0.3,0.05+Math.random()*0.1]).flat(),0.002,0.2));});const wp=[],wc=[];for(let i=0;i<5000;i++){const a=Math.random()*6.2832,r=0.05+Math.random()*0.35;wp.push(Math.cos(a)*r,-0.05+Math.random()*0.04,Math.sin(a)*r);wc.push(1,0.6+Math.random()*0.3,0.15+Math.random()*0.15);}g.add(_mPts(wp,wc,0.003,0.25));const gp=[],gc=[];for(let i=0;i<5000;i++){const a=Math.random()*6.2832,r=0.15+Math.random()*0.3;gp.push(Math.cos(a)*r,-0.09+Math.random()*0.015,Math.sin(a)*r);gc.push(0.7+Math.random()*0.3,0.4+Math.random()*0.2,0.05+Math.random()*0.1);}g.add(_mPts(gp,gc,0.003,0.3));const lp=[],lc=[];for(let i=0;i<6000;i++){const a=Math.random()*6.2832,r=Math.random()*0.4;lp.push(Math.cos(a)*r,Math.random()*0.3,Math.sin(a)*r);lc.push(1,0.7+Math.random()*0.3,0.1+Math.random()*0.2);}g.add(_mPts(lp,lc,0.002,0.15));const mp2=[],mc2=[];for(let i=0;i<3000;i++){const a=Math.random()*6.2832,r=0.05+Math.random()*0.2;mp2.push(Mat // ========== HAND TRACKING ==========
const FT=[4,8,12,16,20],FP=[3,6,10,14,18],FM=[2,5,9,13,17];
function procHand(lm){
  let mx=1,my=1,Mx=0,My=0;
  for(let i=0;i<lm.length;i++){if(lm[i].x<mx)mx=lm[i].x;if(lm[i].y<my)my=lm[i].y;if(lm[i].x>Mx)Mx=lm[i].x;if(lm[i].y>My)My=lm[i].y;}
  const cx=(mx+Mx)/2,cy=(my+My)/2,sz=Math.sqrt((lm[12].x-lm[0].x)**2+(lm[12].y-lm[0].y)**2+(lm[12].z-lm[0].z)**2);
  // Palm center = average of MCP joints
  const pcx=(lm[5].x+lm[9].x+lm[13].x+lm[17].x)/4;
  const pcy=(lm[5].y+lm[9].y+lm[13].y+lm[17].y)/4;
  const pcz=(lm[5].z+lm[9].z+lm[13].z+lm[17].z)/4;
  // Average 3D distance from fingertips to palm center → fist score
  let fingerSpread=0;
  for(let j=0;j<5;j++){const t=lm[FT[j]];const dx=t.x-pcx,dy=t.y-pcy,dz=t.z-pcz;fingerSpread+=Math.sqrt(dx*dx+dy*dy+dz*dz);}
  fingerSpread/=5;
  // 3D finger extension count
  let fu=0;
  for(let j=0;j<5;j++){const t=lm[FT[j]],p=lm[FP[j]],m=lm[FM[j]];const dx=t.x-m.x,dy=t.y-m.y,dz=t.z-m.z;const tipD=Math.sqrt(dx*dx+dy*dy+dz*dz);const px=p.x-m.x,py=p.y-m.y,pz=p.z-m.z;const pipD=Math.sqrt(px*px+py*py+pz*pz);if(tipD>pipD*1.15)fu++;}
  const pd=Math.sqrt((lm[4].x-lm[8].x)**2+(lm[4].y-lm[8].y)**2);
  return{x:cx,y:cy,size:sz,fu,isFist:fu<3&&fingerSpread<0.35&&pd>=0.05,pinch:pd<0.055,ps:pd<0.055?1-pd/0.055:0};
}

  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}

    if(isMobile){constr.video.width={ideal:320};constr.video.height={ideal:240};}else{constr.video.width={ideal:640};constr.video.height={ideal:480};}

function detectFrame(){
  if(!hdl||video.readyState<2)return;
  const n=performance.now();
  if(video.currentTime===lastVT)return;
  lastVT=video.currentTime;
  try{
    const res=hdl.detectForVideo(video,n);
    if(res.landmarks&&res.landmarks.length>0){
      handsCount=res.landmarks.length;
      const h=procHand(res.landmarks[0]);gs.x=h.x;gs.y=h.y;gs.sz=h.size;gs.fu=h.fu;gs.isFist=h.isFist;gs.pinch=h.pinch;gs.ps=h.ps;gs.hp=true;
      if(handsCount>1){const h2=procHand(res.landmarks[1]);gs2.x=h2.x;gs2.y=h2.y;gs2.sz=h2.size;gs2.fu=h2.fu;gs2.isFist=h2.isFist;gs2.pinch=h2.pinch;gs2.ps=h2.ps;gs2.hp=true;}else{gs2.hp=false;gs2.isFist=false;}
    }else{gs.hp=false;gs2.hp=false;handsCount=0;gs.x=ema(gs.x,0.5,0.02);gs.y=ema(gs.y,0.5,0.02);}

}

  else{const as=new Set(day.activeLayers);cosmicLayers.forEach(l=>l.tar=as.has(l.name)?1:0.1);}

  const hideCenter=(microAlpha>0.3&&currentDay>=0)||ss.cz<4;
  coreM.visible=!hideCenter;halo1.visible=!hideCenter;halo2.visible=!hideCenter;
  jets.visible=!hideCenter;ring1.visible=!hideCenter;ring2.visible=!hideCenter;
  coreGlow.visible=!hideCenter;

  // Cosmic layers
  cosmicLayers.forEach(l=>{l.str=ema(l.str,l.tar,0.03);const s=l.str;if(l.isArray){l.obj.forEach(o=>{if(o.material)o.material.opacity=l.bOp*Math.max(s,0.05);if(o.scale)o.scale.setScalar(0.3+s*0.7);});}else{l.obj.material.opacity=l.bOp*Math.max(s,0.05);}});

  const tm=ts*0.001;
  const pC=1+Math.sin(tm*2.3)*0.1;const cS=(0.5+ss.cps*0.5)*pC;
  coreM.scale.setScalar(cS);halo1.scale.setScalar(cS);halo2.scale.setScalar(cS);
  halo1.material.opacity=(0.08+Math.sin(tm*1.7)*0.03)*ss.cps;coreLight.intensity=45+Math.sin(tm*2.5)*5;

  galaxy.rotation.y+=dt*0.1;deepStars.rotation.y+=dt*0.02;deepStars.rotation.x+=dt*0.008;
  jetsAnim(jets,dt);ring1.rotation.y+=dt*0.6;ring2.rotation.y-=dt*0.4;ring2.rotation.x+=dt*0.25;
  aurora.rotation.y+=dt*0.05;const ap=aurora.geometry.attributes.position;
  for(let i=0;i<aurora._N;i++)ap.setY(i,aurora._bp[i*3+1]+Math.sin(aurora._bp[i*3]*0.25+tm*0.7+i*0.008)*0.5);
  ap.needsUpdate=true;

  for(let i=0;i<SHOOTERS;i++){const sd=shooterData[i];sd.t+=dt;if(sd.t>sd.life){sd.t=Math.random()*3;sd.start.set(gauss(0,40),gauss(0,25),gauss(0,40));sd.len=3+Math.random()*8;sd.life=0.6+Math.random()*2;const d2=new T.Vector3(gauss(0,1),gauss(0,1),gauss(0,1)).normalize();sd.dir.copy(d2);}const frac=sd.t/sd.life,bright=frac<0.1?frac/0.1:1-(frac-0.1)/0.9;shPos[i*3]=sd.start.x+sd.dir.x*sd.len*frac;shPos[i*3+1]=sd.start.y+sd.dir.y*sd.len*frac;shPos[i*3+2]=sd.start.z+sd.dir.z*sd.len*frac;shCol[i*3]=bright;shCol[i*3+1]=bright*0.8;shCol[i*3+2]=bright*0.6;}
  shGeo.attributes.position.needsUpdate=true;shGeo.attributes.color.needsUpdate=true;

  geomList[0].rotation.y+=dt*0.1;geomList[1].rotation.x+=dt*0.13;geomList[2].rotation.z+=dt*0.08;
  geomList.forEach((g,i)=>{g.material.opacity=0.06+Math.sin(tm*0.5+i)*0.04+ss.cps*0.08;});

  if(currentDay>=0&&currentDay<daySystems.length&&!dayTransition.active){const sys=daySystems[currentDay];if(sys.visible&&sys.anim)sys.anim(dt,tm);}
  // Micro-world update
  if(currentDay>=0&&currentDay<7){
    microWorlds.forEach((w,i)=>{w.visible=i===currentDay;});
    const mw=microWorlds[currentDay];
    if(mw.visible&&mw._anim)mw._anim(dt,tm);
  }
  applyHandForce();

  // Summary segment progression
  if(currentDay===7&&summaryPlaying&&!dayTransition.active){
    const SEG_TIME=8;summaryTimer+=rdt;
    const newSeg=Math.min(Math.floor(summaryTimer/SEG_TIME),summarySegData.length-1);
    if(newSeg!==summarySeg){
      if(summarySeg>=0)$summaryOver.children[summarySeg].classList.remove('active');
      summarySeg=newSeg;
      $summaryOver.children[summarySeg].classList.add('active');
      // Show corresponding day's universe model
      daySystems.forEach((s,i)=>{s.visible=false;s._mat.opacity=0;});
      if(summarySeg<7&&summarySeg<daySystems.length){const s=daySystems[summarySeg];s.visible=true;s._mat.opacity=0.85;const d=DAYS[summarySeg];if(d&&d.cam){ss.ty=d.cam[0];ss.tp=d.cam[1];ss.tz=d.cam[2];}}
      if(summarySeg===summarySegData.length-1)setTimeout(()=>$credits.classList.add('show'),3000);
    }
  }

  handOrbMat.opacity=0;handTrail.material.opacity=0;

  if(gs.sp>0.3&&!microActive){vortex.visible=true;const vS=gs.sp*1.5;vortex.scale.set(1-vS,1,1-vS);vortex.material.opacity=gs.sp*0.5;vortex.rotation.y+=dt*(2+gs.sp*8);const vp=vortex.geometry.attributes.position;for(let i=0;i<vortex._N;i++){const a=i/vortex._N*6.2832,rad=(0.2+i/vortex._N*12)*(1-gs.sp*0.6),h=(1-i/vortex._N)*8*(1-gs.sp*0.5);vp.setXYZ(i,Math.cos(a+tm*3)*rad,h-4,Math.sin(a+tm*3)*rad);}vp.needsUpdate=true;}else{vortex.visible=false;}

  if(aInit){drones.forEach((d,i)=>{d.f.frequency.setTargetAtTime(80+gs.sy*1800+i*60,aCtx.currentTime,0.1);});const cf=Math.round(gs.sfu);if(cf>0&&cf!==pf)playNote(cf-1);pp=gs.pinch;pf=cf;gt+=rdt;if(gs.sp>0.3&&gt>0.1){playGrain(gs.sp);gt=0;}}

  bloomCurrent=ema(bloomCurrent,bloomTarget,0.06);
  if(goldenMode){coreMat.color.lerp(new T.Color(0xffcc66),0.02);coreLight.color.lerp(new T.Color(0xffaa44),0.02);ambLight.color.lerp(new T.Color(0x1a1208),0.02);}

  const f=Math.round(gs.sfu);$gesN.textContent=gLabels[Math.min(f,5)];
  $gesDot.className='ges-dot'+(bothFistsStable?' fist':'');
  $densB.style.width=(ss.cps*100)+'%';
  if(currentDay>=0&&currentDay<8){const d=DAYS[currentDay];$dayD.textContent=`第 ${'一二三四五六七合'[currentDay]} 日 · ${d.name}`;$dayPoemDisplay.textContent=DAY_POEMS[currentDay];}else{$dayD.textContent='🌌 等待创世…';$dayPoemDisplay.textContent='';}
  // Micro-world overlay
  if(microAlpha>0.05&&currentDay>=0&&currentDay<7&&currentDay!==7){
    $microName.textContent=MICRO_NAMES[currentDay];
    $microDesc.textContent=MICRO_DESCS[currentDay];
    $microOver.style.opacity=Math.min(1,microAlpha*2);
  }else{$microOver.style.opacity=0;}

  if(currentDay>=0)updateWeather(rdt,tm);
  renderBloom();
}

// ========== BOOT ==========
// Init audio on user interaction
document.addEventListener('click',initAudio,{once:true});
document.addEventListener('touchstart',initAudio,{once:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowLeft'){const d=currentDay<0?0:e.key==='ArrowRight'?(currentDay+1)%8:(currentDay+7)%8;setDay(d);}});
// ========== MOBILE TOUCH: pinch zoom + drag rotate + double tap ==========
document.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
  touchCount=e.touches.length;
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    touchDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const newDist=Math.sqrt(dx*dx+dy*dy);
    const delta=(touchDist-newDist)*0.15;
    ss.tz=Math.max(4,Math.min(50,ss.tz+delta));
    touchDist=newDist;
    e.preventDefault();
  }else if(e.touches.length===1&&touchCount===1){
    const dx=e.touches[0].clientX-touchStartX;
    mobileYawOffset+=dx*0.005;
    touchStartX=e.touches[0].clientX;
    e.preventDefault();
  }
},{passive:false});
document.addEventListener('touchend',e=>{
  const now=Date.now();
  if(now-lastTap<400&&touchCount===1&&!dayTransition.active&&fistRel.lock<=0){
    if(microAlpha<0.1){microActive=true;fistRel.cooldown=0.3;toast('🌍 微观世界');}
    else{microActive=false;microAlpha=0;toast('🌌 返回宇宙');}
  }
  lastTap=now;
  if(e.touches.length===0&&e.changedTouches.length===1&&touchCount<=1){
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    if(Math.abs(dx)>Math.abs(dy)*2&&Math.abs(dx)>60&&!dayTransition.active&&fistRel.lock<=0&&microAlpha<0.3){
      dx>0?goPrevDay():goNextDay();
    }
  }
  touchCount=0;
},{passive:true});
// Mobile nav buttons
$navPrev.addEventListener('click',()=>{if(!dayTransition.active&&fistRel.lock<=0)goPrevDay();});
$navNext.addEventListener('click',()=>{if(!dayTransition.active&&fistRel.lock<=0)goNextDay();});

setLoad('创世之掌·七日谈','起初，神创造天地…');
requestAnimationFrame(animate);

// Start camera, then MP
initCam().then(()=>{
  camInitDone=true;
  return initMP();
}).catch(()=>{});

// Safety fallback: if boot hasn't completed in 8s, show skip + auto-complete at 15s
setTimeout(()=>{
  if(!$load.classList.contains('done')){
    $skip.style.display='block';
    setLoad('创世之掌·七日谈','⏳ 加载时间较长…');
  }
},8000);
setTimeout(()=>{
  if(!$load.classList.contains('done')){
    completeBoot();
    toast('📷 摄像头未就绪 — 已进入预览模式');
  }
},15000);

window.addEventListener('resize',()=>{
  const w=innerWidth,h=innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);
  microCam.aspect=w/h;microCam.updateProjectionMatrix();
  bloomW=Math.floor(w/2);bloomH=Math.floor(h/2);
  fullRT.setSize(w,h);
  bloomRT.setSize(w,h);
  halfRT.setSize(bloomW,bloomH);
  halfRT2.setSize(bloomW,bloomH);
  microRT.setSize(w,h);
  if($weather){$weather.width=w;$weather.height=h;}
  [blurH,blurV].forEach(m=>{m.uniforms.res.value.set(bloomW,bloomH);});
});

}();
</script>
